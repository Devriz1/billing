{% extends "layouts/app.html" %}

{% block title %}Category{% endblock %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-header">

        <h4>

            {% if object %}
                Edit Category
            {% else %}
                Add Category
            {% endif %}

        </h4>

    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">

                    Category Name

                </label>

                {{ form.name }}

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Description

                </label>

                {{ form.description }}

            </div>

            <div class="form-check mb-4">

                {{ form.is_active }}

                <label class="form-check-label">

                    Active

                </label>

            </div>

            <button class="btn btn-primary">

                Save Category

            </button>

            <a href="{% url 'products:category_list' %}"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
