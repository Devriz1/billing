{% extends "layouts/app.html" %}

{% block title %}Supplier{% endblock %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-header">
        <h4>{{ view.object|default:"Add Supplier" }}</h4>
    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            <div class="row">

                {% for field in form %}

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}

                        <div class="text-danger small">
                            {{ field.errors }}
                        </div>

                    {% endif %}

                </div>

                {% endfor %}

            </div>

            <button class="btn btn-success">
                Save Supplier
            </button>

            <a href="{% url 'suppliers:list' %}"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
